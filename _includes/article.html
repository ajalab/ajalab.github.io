<article>
  <h1><a href="{{ include.post.url }}">{{ include.post.title }}</a></h1>
  <p class="author">
    {{ include.post.tags | join: ', '}} |
    <span class="date">{{ include.post.date | date: '%Y-%m-%d' }}</span>
  </p>
  <div class="content">
    {{ include.post.content }}
  </div>
</article>
